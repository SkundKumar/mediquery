name: Deploy MediQuery Level 2 Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # STAGE 1: Continuous Integration (Testing)
  # ==========================================
  test-logic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt

      - name: Run PyTest Suite
        run: |
          pytest test_engine.py -v

  # ==========================================
  # STAGE 2: Continuous Deployment (Locked behind Stage 1)
  # ==========================================
  deploy:
    needs: test-logic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mediquery
          IMAGE_TAG: latest
        run: |
          docker build --platform linux/amd64 --provenance=false -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update AWS Lambda Function
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: mediquery
          IMAGE_TAG: latest
        run: |
          aws lambda update-function-code \
            --function-name mediquery-engine \
            --image-uri $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG